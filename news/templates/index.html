{% extends 'base.html' %}
{% load static %}

{% block title %}Minimalist News{% endblock %}

{% block content %}
<div class="tabs-container" id="tabs">
    <div class="tab active" data-category="politics">Politics</div>
    <div class="tab" data-category="cryptocurrency" style="z-index: 2;">Cryptocurrency</div>
    <div class="tab" data-category="travel" style="z-index: 1;">Travel</div>
</div>

<div class="app-body">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title" id="sidebar-title">Politics News</div>
            <div class="icon-btn" onclick="fetchNews(currentCategory)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                    <path d="M21 3v5h-5"></path>
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                    <path d="M8 16H3v5"></path>
                </svg>
            </div>
        </div>
        
        <div class="note-list" id="news-list">
            <!-- News items will be loaded here -->
        </div>
    </div>

    <div class="main-editor">
        <div class="editor-header">
            <div style="flex: 1;">
                <div class="editor-meta" id="main-meta">Select a news article...</div>
                <div class="editor-title" id="main-title">No article selected</div>
            </div>
        </div>

        <div class="editor-content" id="main-content">
            <p>Select an article from the sidebar to view its details here.</p>
        </div>
    </div>
</div>
{% endblock %}
